name: Discover jobs

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 13 * * *"  # daily 6am PT

permissions:
  contents: write

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests
      - run: python3 gh_discover_ci.py
      - name: Commit results
        run: |
          git config user.name "applypilot-bot"
          git config user.email "actions@users.noreply.github.com"
          git add jobs_found.json
          git diff --cached --quiet || git commit -m "chore: discovery run $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
